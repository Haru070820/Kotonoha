<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상용한자 2136자 — 言の葉 코토노하</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/kanji.css">
</head>
<body>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo">
      <span class="logo-jp">言の葉</span>
      <span class="logo-kr">kotonoha</span>
    </a>
  </div>
  <nav>
    <a href="index.html">홈</a>
    <a href="javascript:void(0)" style="color:var(--muted, gray); pointer-events:none; cursor:default;" title="현재 준비 중입니다">커뮤니티</a>
    <a href="settings.html" style="padding:6px 10px;opacity:0.7;display:flex;align-items:center" title="설정"><span class="material-symbols-outlined">settings</span></a>
  </nav>
</header>

<!-- 사이드바 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- 슬라이드 사이드바 -->
<div class="slide-sidebar" id="slideSidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <span class="sb-logo-jp">言の葉</span>
      <span class="sb-logo-kr">kotonoha</span>
    </div>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <nav class="sb-nav">
      <a href="index.html"><span class="sb-icon"><span class="material-symbols-outlined">home</span></span>홈</a>
      <a href="kana.html"><span class="sb-icon"><span class="material-symbols-outlined">translate</span></span>가나</a>
      <a href="jlpt.html"><span class="sb-icon"><span class="material-symbols-outlined">school</span></span>JLPT</a>
      <a href="kanji.html" class="active"><span class="sb-icon"><span class="material-symbols-outlined">menu_book</span></span>한자</a>
      <a href="player.html"><span class="sb-icon"><span class="material-symbols-outlined">music_note</span></span>가사 학습</a>
      <div class="sb-divider"></div>
      <a href="settings.html"><span class="sb-icon"><span class="material-symbols-outlined">settings</span></span>설정</a>
  </nav>
  <div class="sb-footer">言の葉 코토노하 v2</div>
</div>

<div class="page-header">
  <h1>常用漢字 2136字</h1>
  <p>일본 상용한자 2136자 — JLPT 급수별로 학습하고 완료 체크하세요</p>
</div>

<!-- Progress -->
<div class="progress-section">
  <div class="progress-inner">
    <div class="progress-stats">
      <div class="prog-stat">
        <div class="prog-num" id="doneCount">0</div>
        <div class="prog-label">학습 완료</div>
      </div>
      <div class="prog-stat">
        <div class="prog-num" id="totalCount">2136</div>
        <div class="prog-label">전체</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
        <div class="progress-pct" id="progressPct">0% 완료</div>
      </div>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="level-tabs">
  <button class="level-tab active" data-level="N5" style="--tab-color:var(--n5)" onclick="switchLevel('N5')">N5 · 108字</button>
  <button class="level-tab" data-level="N4" style="--tab-color:var(--n4)" onclick="switchLevel('N4')">N4 · 29字</button>
  <button class="level-tab" data-level="N3" style="--tab-color:var(--n3)" onclick="switchLevel('N3')">N3 · 29字</button>
  <button class="level-tab" data-level="N2" style="--tab-color:var(--n2)" onclick="switchLevel('N2')">N2 · 27字</button>
  <button class="level-tab" data-level="N1" style="--tab-color:var(--n1)" onclick="switchLevel('N1')">N1 · 30字</button>
</div>

<div class="container">
  <div class="controls">
    <input type="text" class="search-input" id="searchInput" placeholder="한자 또는 읽기 검색..." oninput="filterKanji()">
    <button class="filter-btn" id="filterAll" onclick="setFilter('all')">전체</button>
    <button class="filter-btn" id="filterUndone" onclick="setFilter('undone')">미완료만</button>
    <button class="filter-btn" id="filterDone" onclick="setFilter('done')">완료만</button>
    <span class="count-pill" id="countPill">0字</span>
  </div>
  <div class="kanji-grid" id="kanjiGrid"></div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <button class="dp-close" onclick="closeDetail()">✕</button>
  <div style="clear:both"></div>
  
  <div style="text-align:left; margin-bottom: 10px;">
    <span class="dp-level-badge" id="dpLevel" style="border-radius:4px; padding:4px 8px; font-weight:bold; color:#fff; font-size:0.8rem;"></span>
  </div>

  <div style="text-align:center; margin-bottom: 30px;">
    <div class="dp-char" id="dpChar" style="font-size: 5rem; font-family: 'Noto Serif JP', serif; line-height: 1;"></div>
    <div class="dp-value" id="dpKr" style="color:#a08060; font-family:'Noto Sans KR',sans-serif; font-size:1rem; font-weight:700; margin-top:20px;"></div>
  </div>

  <div class="dp-section">
    <div class="dp-label" style="font-weight:bold; color:#88b; font-size:0.8rem; margin-bottom:4px;">음독 (音読み)</div>
    <div style="display:flex; align-items:center; gap: 10px;">
      <div class="dp-value" id="dpOn" style="font-size:1.1rem; font-weight:500;"></div>
      <div id="dpOnTts"></div>
    </div>
  </div>
  
  <div class="dp-section" style="margin-top:20px;">
    <div class="dp-label" style="font-weight:bold; color:#88b; font-size:0.8rem; margin-bottom:4px;">훈독 (訓読み)</div>
    <div style="display:flex; align-items:center; gap: 10px;">
      <div class="dp-value" id="dpKun" style="font-size:1.1rem; font-weight:500;"></div>
      <div id="dpKunTts"></div>
    </div>
  </div>

  <div class="dp-divider" style="height:1px; background:var(--border); margin:20px 0;"></div>
  
  <div class="dp-section">
    <div class="dp-label" style="font-weight:bold; color:#88b; font-size:0.8rem; margin-bottom:4px;">뜻 · 의미</div>
    <div class="dp-value" id="dpMeaning" style="font-size:1rem; color:var(--font);"></div>
  </div>
  
  <div class="dp-divider" style="height:1px; background:var(--border); margin:20px 0;"></div>
  <button class="dp-done-btn" id="dpDoneBtn" onclick="toggleDoneFromPanel()" style="width:100%; border:2px solid #27ae60; color:#27ae60; background:none; border-radius:8px; padding:10px; font-weight:bold; font-size:1rem; cursor:pointer;">○ 학습 완료 체크</button>
</div>

<script src="scripts/kanjiDB.js"></script>
<script src="scripts/tts.js"></script>
<script src="scripts/kanji.js"></script>
<script>
(function(){const s=JSON.parse(localStorage.getItem('kotonoha_settings')||'{}');if(s.darkMode)document.body.classList.add('dark');})();
</script>
<script>
function toggleSidebar(){
  const sb=document.getElementById('slideSidebar');
  const ov=document.getElementById('sidebarOverlay');
  const hb=document.getElementById('hamburgerBtn');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
  hb.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('slideSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSidebar();});
</script>
</body>
</html>
