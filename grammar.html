<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>문법 배우기 — 言の葉 코토노하</title>
<link rel="stylesheet" href="css/common.css">
<style>
  .grammar-wrap { padding: 40px 20px; max-width: 800px; margin: 0 auto; }
  .grammar-card { background: var(--paper); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
  .grammar-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: var(--accent-gold); }
  .grammar-desc { line-height: 1.6; color: var(--text); }
</style>
</head>
<body>
<div class="grammar-wrap">
  <h1>📚 문법 배우기 [조사, 동사 등]</h1>
  <p style="margin-bottom: 30px; opacity: 0.7;">가사 학습 모드에서 사용되는 주요 문법 요소들을 미리 학습해보세요.</p>
  
  <div id="grammarList"></div>
  
  <a href="player.html" style="display:inline-block; margin-top:20px; color:var(--accent-gold); text-decoration:none;">← 가사 학습으로 돌아가기</a>
</div>
<script src="scripts/grammarDB.js"></script>
<script>
  const list = document.getElementById('grammarList');
  list.innerHTML = Object.entries(grammarDB).map(([key, data]) => `
    <div class="grammar-card">
      <div class="grammar-title">${key} (${data.title})</div>
      <div class="grammar-desc">${data.desc}</div>
    </div>
  `).join('');
</script>
</body>
</html>
