<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가사 학습 — 言の葉 코토노하</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/player.css">
<script>
(function(){const s=JSON.parse(localStorage.getItem('kotonoha_settings')||'{}');if(s.darkMode)document.body.classList.add('dark');})();
</script>
</head>
<body>
<header>
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo">
      <span class="logo-jp">言の葉</span>
      <span class="logo-kr">kotonoha</span>
    </a>
  </div>
  <nav>
    <a href="index.html">홈</a>
    <a href="community.html">커뮤니티</a>
    <a href="settings.html" style="padding:6px 10px;opacity:0.7;display:flex;align-items:center" title="설정"><span class="material-symbols-outlined">settings</span></a>
  </nav>
</header>

<!-- 사이드바 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- 슬라이드 사이드바 -->
<div class="slide-sidebar" id="slideSidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <span class="sb-logo-jp">言の葉</span>
      <span class="sb-logo-kr">kotonoha</span>
    </div>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <nav class="sb-nav">
      <a href="index.html"><span class="sb-icon"><span class="material-symbols-outlined">home</span></span>홈</a>
      <a href="kana.html"><span class="sb-icon"><span class="material-symbols-outlined">translate</span></span>가나</a>
      <a href="jlpt.html"><span class="sb-icon"><span class="material-symbols-outlined">school</span></span>JLPT</a>
      <a href="kanji.html"><span class="sb-icon"><span class="material-symbols-outlined">menu_book</span></span>한자</a>
      <a href="player.html" class="active"><span class="sb-icon"><span class="material-symbols-outlined">music_note</span></span>가사 학습</a>
      <div class="sb-divider"></div>
      <a href="settings.html"><span class="sb-icon"><span class="material-symbols-outlined">settings</span></span>설정</a>
  </nav>
  <div class="sb-footer">言の葉 코토노하 v2</div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-title">SONG LIST · 곡 목록</div>
    <!-- 카테고리 탭 -->
    <div class="player-cat-tabs" style="display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:2px;white-space:nowrap;scrollbar-width:none;-ms-overflow-style:none;">
      <button class="p-cat-tab active" onclick="setPlayerCat('all')">전체</button>
      <button class="p-cat-tab" onclick="setPlayerCat('popular')">인기</button>
      <button class="p-cat-tab" onclick="setPlayerCat('new')">최신</button>
      <button class="p-cat-tab" onclick="setPlayerCat('artist')">가수 별</button>
    </div>
    <style>
      .player-cat-tabs::-webkit-scrollbar { display: none; }
      .p-cat-tab { flex-shrink: 0; padding: 5px 12px; }
    </style>
    <!-- 노래 검색 -->
    <div style="position:relative;margin-bottom:10px;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;pointer-events:none"><span class="material-symbols-outlined" style="font-size:0.9rem">search</span></span>
      <input type="text" id="songSearchPlayer"
        style="width:100%;padding:8px 10px 8px 30px;border:1px solid var(--border);border-radius:8px;font-size:0.82rem;font-family:inherit;outline:none;background:var(--paper);color:var(--ink);"
        placeholder="노래 검색…" oninput="renderSongList()">
    </div>
    <div id="songList"></div>
  </aside>
  <main class="player-area">
    <div class="song-header">
      <h2 id="songTitle">노래를 선택해주세요</h2>
      <p id="songArtist">← 왼쪽 목록에서 곡을 선택하세요</p>
    </div>
    <div class="fav-bar">
      <span class="fav-bar-text">즐겨찾기: <strong id="favCountDisplay">0/50</strong>개</span>
      <button class="view-favs-btn" onclick="toggleFavPanel()"><span class="material-symbols-outlined ms-filled" style="font-size:0.85rem;vertical-align:-2px">star</span> 즐겨찾기 보기</button>
    </div>
    <div class="lyrics-container" id="lyricsContainer">
      <div class="empty-state">
        <div class="big"><span class="material-symbols-outlined" style="font-size:2.5rem">music_note</span></div>
        <div>왼쪽에서 노래를 선택하면 가사가 표시됩니다</div>
        <div style="margin-top:10px;font-size:0.8rem">단어에 <b>마우스를 올리면</b> 뜻 미리보기 · <b>클릭하면</b> 고정</div>
      </div>
    </div>
  </main>
</div>
<div class="tooltip" id="tooltip">
  <div class="tt-header">
    <div><div class="tt-word" id="tt-word"></div><div class="tt-kanji" id="tt-kanji"></div></div>
    <div id="tt-tts-btn"></div>
  </div>
  <div class="tt-reading" id="tt-reading"></div>
  <div class="tt-divider"></div>
  <ul class="tt-meaning" id="tt-meaning"></ul>
  <button class="tt-fav-btn" id="tt-fav-btn" onclick="toggleFavFromTooltip()">☆ 즐겨찾기</button>
  <div class="tt-pin-hint" id="tt-pin-hint">클릭하면 고정됩니다</div>
</div>
<div class="fav-panel" id="favPanel">
  <div class="fav-panel-title"><span class="material-symbols-outlined ms-filled" style="font-size:1rem;color:var(--accent-gold);vertical-align:-2px;margin-right:4px">star</span> 즐겨찾기 단어장<button class="close-panel" onclick="toggleFavPanel()">✕</button></div>
  <div id="favList"></div>
</div>
<script src="scripts/wordDB.js"></script>
<script src="scripts/songs.js"></script>
<script src="scripts/tts.js"></script>
<script src="scripts/player.js"></script>
<script>
function toggleSidebar(){
  const sb=document.getElementById('slideSidebar');
  const ov=document.getElementById('sidebarOverlay');
  const hb=document.getElementById('hamburgerBtn');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
  hb.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('slideSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSidebar();});
</script>
</body>
</html>
