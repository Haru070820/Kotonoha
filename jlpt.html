<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JLPT 단어 학습 — 言の葉 코토노하</title>
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/jlpt.css">
</head>
<body>

<header>
  <div class="header-left">
    <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="메뉴">
      <span></span><span></span><span></span>
    </button>
    <a href="index.html" class="logo">
      <span class="logo-jp">言の葉</span>
      <span class="logo-kr">kotonoha</span>
    </a>
  </div>
  <nav>
    <a href="index.html">홈</a>
    <a href="javascript:void(0)" style="color:var(--muted, gray); pointer-events:none; cursor:default;" title="현재 준비 중입니다">커뮤니티</a>
    <a href="settings.html" style="padding:6px 10px;opacity:0.7;display:flex;align-items:center" title="설정"><span class="material-symbols-outlined">settings</span></a>
  </nav>
</header>

<!-- 사이드바 오버레이 -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- 슬라이드 사이드바 -->
<div class="slide-sidebar" id="slideSidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <span class="sb-logo-jp">言の葉</span>
      <span class="sb-logo-kr">kotonoha</span>
    </div>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <nav class="sb-nav">
      <a href="index.html"><span class="sb-icon"><span class="material-symbols-outlined">home</span></span>홈</a>
      <a href="kana.html"><span class="sb-icon"><span class="material-symbols-outlined">translate</span></span>가나</a>
      <a href="jlpt.html" class="active"><span class="sb-icon"><span class="material-symbols-outlined">school</span></span>JLPT</a>
      <a href="kanji.html"><span class="sb-icon"><span class="material-symbols-outlined">menu_book</span></span>한자</a>
      <a href="player.html"><span class="sb-icon"><span class="material-symbols-outlined">music_note</span></span>가사 학습</a>
      <div class="sb-divider"></div>
      <a href="settings.html"><span class="sb-icon"><span class="material-symbols-outlined">settings</span></span>설정</a>
  </nav>
  <div class="sb-footer">言の葉 코토노하 v2</div>
</div>

<div class="page-header">
  <h1>JLPT 단어 학습</h1>
  <p>N5부터 N1까지 급수별 필수 어휘 — 단어에 마우스를 올려 즐겨찾기하세요</p>
</div>

<div class="level-tabs" id="levelTabs">
  <button class="level-tab active" data-level="N5" onclick="switchLevel('N5')">N5 입문</button>
  <button class="level-tab" data-level="N4" onclick="switchLevel('N4')">N4 초급</button>
  <button class="level-tab" data-level="N3" onclick="switchLevel('N3')">N3 중급</button>
  <button class="level-tab" data-level="N2" onclick="switchLevel('N2')">N2 중상급</button>
  <button class="level-tab" data-level="N1" onclick="switchLevel('N1')">N1 상급</button>
</div>

<div class="container">
  <!-- Today's word -->
  <div class="today-highlight" id="todayHighlight"></div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="단어 검색..." oninput="filterWords()">
    <select class="filter-select" id="posFilter" onchange="filterWords()">
      <option value="">품사 전체</option>
      <option value="명사">명사</option>
      <option value="동사">동사</option>
      <option value="형용사">형용사</option>
      <option value="부사">부사</option>
    </select>
    <span class="stats-pill" id="wordCountPill">0개</span>
  </div>

  <!-- Word grid -->
  <div class="word-grid" id="wordGrid"></div>
  <button class="load-more" id="loadMoreBtn" onclick="loadMore()" style="display:none">더 보기 →</button>
</div>

<script src="scripts/jlptDB.js"></script>
<script src="scripts/tts.js"></script>
<script src="scripts/jlpt.js"></script>
<script>
(function(){const s=JSON.parse(localStorage.getItem('kotonoha_settings')||'{}');if(s.darkMode)document.body.classList.add('dark');})();
</script>
<script>
function toggleSidebar(){
  const sb=document.getElementById('slideSidebar');
  const ov=document.getElementById('sidebarOverlay');
  const hb=document.getElementById('hamburgerBtn');
  const open=sb.classList.toggle('open');
  ov.classList.toggle('open',open);
  hb.classList.toggle('open',open);
  document.body.style.overflow=open?'hidden':'';
}
function closeSidebar(){
  document.getElementById('slideSidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
  document.getElementById('hamburgerBtn').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSidebar();});
</script>
</body>
</html>
